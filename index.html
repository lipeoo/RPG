<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG WIKI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-bold text-amber-400">RPG WIKI</h1>
            <p class="text-gray-400 mt-3 text-lg">Classes & Raças</p>
        </header>

        <nav class="flex justify-center gap-6 mb-12 border-b border-gray-700 pb-6">
            <button onclick="showTab(0)" class="tab-btn active px-10 py-3 text-lg">Classes</button>
            <button onclick="showTab(1)" class="tab-btn px-10 py-3 text-lg">Raças</button>
        </nav>

        <!-- ABA CLASSES -->
        <div id="tab-0" class="tab-content">
            <input type="text" id="search-classes" 
                   placeholder="🔍 Buscar por nome ou rótulo..." 
                   class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-5 text-lg mb-10 focus:border-amber-500">

            <div id="classes-groups" class="space-y-12"></div>
        </div>

        <!-- ABA RAÇAS -->
        <div id="tab-1" class="tab-content hidden">
            <input type="text" id="search-races" 
                   placeholder="🔍 Buscar por nome ou rótulo..." 
                   class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-5 text-lg mb-10 focus:border-amber-500">

            <div id="races-groups" class="space-y-12"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 rounded-3xl max-w-2xl w-full max-h-[95vh] overflow-auto">
            <div class="p-8" id="modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
